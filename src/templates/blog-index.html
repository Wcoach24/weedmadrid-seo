<!DOCTYPE html>
<html lang="{{lang}}" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{pageTitle}} | Weed Madrid</title>
  <meta name="description" content="{{metaDescription}}">
  <link rel="canonical" href="https://www.weedmadrid.com{{canPath}}">
  {{hreflangTags}}
  <meta property="og:title" content="{{pageTitle}}">
  <meta property="og:description" content="{{metaDescription}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.weedmadrid.com{{canPath}}">
  <link rel="preconnect" href="https://res.cloudinary.com">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="stylesheet" href="{{langPrefix}}/css/styles.css">

  <!-- Schema: BreadcrumbList -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {"@type": "ListItem", "position": 1, "name": "{{labels.home}}", "item": "https://www.weedmadrid.com{{langPrefix}}/"},
      {"@type": "ListItem", "position": 2, "name": "Blog"}
    ]
  }
  </script>
</head>
<body>
  {{> header}}

  <nav class="breadcrumb" aria-label="Breadcrumb">
    <div class="container">
      <ol>
        <li><a href="{{langPrefix}}/">{{labels.home}}</a></li>
        <li aria-current="page">Blog</li>
      </ol>
    </div>
  </nav>

  <header class="blog-header">
    <div class="container">
      <h1>{{pageTitle}}</h1>
      <p class="blog-header__subtitle">{{labels.blogSubtitle}}</p>
    </div>
  </header>

  <section class="blog-grid-section">
    <div class="container">
      <div class="blog-grid">
        {{postsListHtml}}
      </div>
    </div>
  </section>

  <section class="cta-section">
    <div class="container">
      <div class="cta-box" data-cta="blog-index">
        <h2>{{labels.ctaTitle}}</h2>
        <p>{{labels.ctaSubtitle}}</p>
        <a href="https://www.weedmadrid.com/invite/vallehermoso-club-social-madrid" class="btn btn-primary btn-large">{{labels.requestInvitation}}</a>
      </div>
    </div>
  </section>

  {{> footer}}
  <script src="{{langPrefix}}/js/personalization.js" defer></script>
  <script src="{{langPrefix}}/js/main.js" defer></script>
</body>
</html>
